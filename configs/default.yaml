# configs/default.yaml
# AffinityVM default training configuration

model:
  gnn:
    in_node_dim: 36
    in_edge_dim: 10
    hidden_dim: 128
    latent_dim: 256
    n_layers: 5
    dropout: 0.10
  head:
    dropout: 0.15

md:
  n_steps: 10000
  dt: 0.001          # ps
  cutoff: 12.0        # Å

training:
  epochs: 50
  batch_size: 16
  learning_rate: 3.0e-4
  weight_decay: 1.0e-5
  grad_clip: 1.0
  scheduler: cosine
  warmup_epochs: 5

data:
  max_atoms: 80
  train_split: 0.8
  seed: 42

hardware:
  device: auto        # auto | cpu | cuda
  num_workers: 4
  pin_memory: true
